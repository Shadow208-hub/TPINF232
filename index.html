<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stat AI | Collecte de Données</title>
    <link rel="stylesheet" href="/static/index.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="/static/index.js"></script>
</head>
<body>
    <section class="hero">
        <header>
            <div class="logo-container">
                <img src="IA5.jpeg" alt="Stat AI Logo" class="logo-img">
                <a href="#" class="logo-text">STAT<span>AI</span></a>
            </div>
        </header>

        <div class="content">
            <h1>Contribuez à l'étude sur l'IA</h1>
            <div class="hero-description">
                <p>Vos réponses nous aident à analyser l'impact des nouvelles technologies dans différents domaines.</p>
            </div>
            <div class="btn-container">
                <a href="#collecte" class="btn">Remplir le Formulaire</a>
            </div>
        </div>
    </section>

    <section id="collecte" class="features" style="background: #0f172a;">
        <div class="section-title">
            <h2>Collecte de <span>Données</span></h2>
        </div>
        <div class="form-wrapper">
            <form id="dataForm">
                <div class="form-group">
                    <label for="age">Quel est votre âge ?</label>
                    <input type="number" id="age" placeholder="Ex: 21" required min="10" max="100">
                </div>
                <div class="form-group">
                    <label for="sexe">Sexe :</label>
                    <select id="sexe" required>
                        <option value="Masculin">Masculin</option>
                        <option value="Feminin">Féminin</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="niveau_etude">Votre niveau d'étude actuel :</label>
                    <select id="niveau_etude" required>
                        <option value="lycee">Lycée</option>
                        <option value="Baccalaureat">Baccalauréat</option>
                        <option value="Licence">Licence</option>
                        <option value="Master">Master</option>
                        <option value="Doctorat">Doctorat</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="domaine">Dans quel domaine évoluez-vous ?</label>
                    <select id="domaine" required>
                        <option value="Informatique">Informatique</option>
                        <option value="Medecine">Médecine</option>
                        <option value="Ingenierie">Ingénierie</option>
                        <option value="Finances">Finances</option>
                        <option value="Autres">Autres</option>
                    </select>
                </div>
                <div class="form-group">
                    <label id="label-frequence">Fréquence d'usage (1 à 30 fois) : <strong>15</strong></label>
                    <input type="range" id="frequence" min="1" max="30" value="15" oninput="document.querySelector('#label-frequence strong').innerText = this.value">
                </div>
                <button type="submit" class="btn" style="width: 100%; margin-top: 20px;">Envoyer mes données</button>
            </form>
        </div>
    </section>

    <script src="index.js"></script>
</body>
</html>
